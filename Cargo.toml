[package]
name = "foksal"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.57", features = ["derive"] }
crossbeam = "0.8.4"
dunce = "1.0.5"
erased-serde = "0.4.9"
futures-util = "0.3.31"
globset = "0.4.18"
jwalk = "0.8.1"
lazy_static = "1.5.0"
notify = { version = "8.2.0", features = ["crossbeam-channel"] }
rayon = "1.11.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
symphonia = { version = "0.5.5", features = ["all", "opt-simd"] }
tokio = { version = "1.49.0", features = ["full"] }
tokio-tungstenite = "0.28.0"
tokio-util = "0.7.18"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"

[dev-dependencies]
tempfile = "3.10.1"
