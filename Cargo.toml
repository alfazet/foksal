[package]
name = "foksal"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.57", features = ["derive"] }
crossbeam = "0.8.4"
dunce = "1.0.5"
futures-util = "0.3.31"
globset = "0.4.18"
jwalk = "0.8.1"
lazy_static = "1.5.0"
notify = { version = "8.2.0", features = ["crossbeam-channel"] }
rayon = "1.11.0"
symphonia = { version = "0.5.5", features = ["all", "opt-simd"] }
tokio = { version = "1.49.0", features = ["full"] }
tokio-tungstenite = "0.28.0"

[dev-dependencies]
tempfile = "3.10.1"
