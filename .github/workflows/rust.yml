name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  check-libs:
    name: check libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"

      - uses: Swatinem/rust-cache@v2

      - name: check libfoksalcommon
        run: cargo check -p libfoksalcommon

      - name: check libfoksalaudio
        run: cargo check -p libfoksalaudio

      - name: check libfoksaldb
        run: cargo check -p libfoksaldb

      - name: check libfoksalclient
        run: cargo check -p libfoksalclient
